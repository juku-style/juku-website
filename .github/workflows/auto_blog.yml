name: 学習ブログ自動生成

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要なライブラリをインストール
        run: pip install anthropic

      - name: ブログ記事を生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_blog.py

      - name: 生成した記事をコミット・プッシュ
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 ブログ記事を自動生成 $(date '+%Y-%m-%d')"
          git push
